{% extends 'base.html' %}

{% block title %}Edit Profile | {{ site_settings.site_name }}{% endblock %}

{% block content %}
<div class="container my-5">
  <div class="row justify-content-center">
    <div class="col-md-6">
      <div class="auth-card">
        <h4 class="mb-4">Edit Profile</h4>
        <form method="post" enctype="multipart/form-data">
          {% csrf_token %}
          <div class="row g-3">
            <div class="col-md-6"><label class="form-label">First Name</label>{{ form.first_name }}</div>
            <div class="col-md-6"><label class="form-label">Last Name</label>{{ form.last_name }}</div>
            <div class="col-12"><label class="form-label">Phone Number</label>{{ form.phone }}</div>
            <div class="col-12"><label class="form-label">Date of Birth</label>{{ form.date_of_birth }}</div>
            <div class="col-12"><label class="form-label">Profile Photo</label>{{ form.avatar }}</div>
          </div>
          <div class="d-flex gap-3 mt-4">
            <button type="submit" class="btn btn-primary">Save Changes</button>
            <a href="{% url 'accounts:profile' %}" class="btn btn-outline-secondary">Cancel</a>
          </div>
        </form>
      </div>
    </div>
  </div>
</div>
{% endblock %}
