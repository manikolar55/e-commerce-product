{% extends 'base.html' %}
{% block title %}404 - Page Not Found | {{ site_settings.site_name }}{% endblock %}
{% block content %}
<div class="container my-5 text-center py-5">
  <h1 class="display-1 text-primary fw-bold">404</h1>
  <h3>Page Not Found</h3>
  <p class="text-muted">The page you're looking for doesn't exist or has been moved.</p>
  <a href="{% url 'store:home' %}" class="btn btn-primary btn-lg mt-3">Go Home</a>
</div>
{% endblock %}
